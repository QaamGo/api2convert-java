name: live-conformance

# Runs the live conformance suite against the real API2Convert API whenever a new
# version is tagged (or on demand). The API key is an encrypted repository secret,
# never exposed to fork pull requests. The conformance test is @Tag("live"), which
# the pom excludes by default — clearing excludedGroups runs it.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
      - name: Live conformance
        run: mvn -B test -Dtest=ConversionConformanceTest -DexcludedGroups= -DfailIfNoTests=false
        env:
          API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
