name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build & test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ['17', '21']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      # `mvn verify` compiles the whole surface and runs the offline unit suite. The live
      # conformance test auto-skips unless API2CONVERT_API_KEY is set, so no key is needed here.
      - name: Build and test
        run: mvn -B verify
